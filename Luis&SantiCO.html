<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Luis&SantiCO — Sonido con intención.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..500;1,9..144,300..500&family=Inter+Tight:wght@400;450;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0e0d0b; --surface:#16140f; --surface-2:#1f1c16;
  --ink:#f3ece0; --ink-soft:#a39b8c; --ink-faint:#6b6457;
  --line:#2a261f; --line-strong:#3a342a;
  --accent:oklch(0.78 0.14 68); --accent-ink:#0e0d0b;
  --radius-md:10px; --radius-lg:18px; --radius-xl:28px;
  --font-display:'Fraunces','Source Serif 4',Georgia,serif;
  --font-body:'Inter Tight','Helvetica Neue',Arial,sans-serif;
  --font-mono:'JetBrains Mono',ui-monospace,monospace;
}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:var(--font-body);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;font-size:15px;line-height:1.5}
::selection{background:var(--accent);color:var(--accent-ink)}
h1,h2,h3,h4{font-family:var(--font-display);text-wrap:pretty;font-weight:400}
.lsc-container{max-width:1440px;margin:0 auto;padding:0 40px}
.lsc-nav-link{position:relative}
.lsc-nav-link::after{content:"";position:absolute;left:0;right:0;bottom:-4px;height:1px;background:var(--accent);transform:scaleX(0);transform-origin:right;transition:transform .4s cubic-bezier(.2,.8,.2,1)}
.lsc-nav-link:hover::after{transform:scaleX(1);transform-origin:left}
.lsc-btn:hover{transform:translateY(-2px)}
.lsc-btn-primary:hover{box-shadow:0 12px 40px -8px color-mix(in oklab,var(--accent) 50%,transparent)}
.lsc-btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
.lsc-btn-invert:hover{background:var(--accent);border-color:var(--accent);color:var(--accent-ink)}
.lsc-show-mobile{display:none}
@keyframes lsc-marquee{from{transform:translateX(0)}to{transform:translateX(-33.333%)}}
@keyframes lsc-spin{to{transform:rotate(360deg)}}
@keyframes lsc-pop{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
@keyframes lsc-bar{0%{opacity:.3}50%{opacity:1}100%{opacity:.3}}
@media(max-width:1024px){
  .lsc-container{padding:0 28px}
  .lsc-pdp-grid{grid-template-columns:1fr!important;gap:40px!important}
  .lsc-pdp-sticky{position:static!important}
  .lsc-checkout-grid{grid-template-columns:1fr!important}
  .lsc-hero-grid{grid-template-columns:1fr!important}
}
@media(max-width:760px){
  .lsc-container{padding:0 20px}
  .lsc-nav-links{display:none!important}
  .lsc-show-mobile{display:inline-flex!important}
  .lsc-footer-grid{grid-template-columns:1fr!important;gap:40px!important}
  .lsc-catalog-grid{grid-template-columns:repeat(2,1fr)!important}
  .lsc-manifesto-row{grid-template-columns:1fr!important;gap:20px!important}
}
input,textarea,button,select{font-family:inherit}
.lsc-input{width:100%;padding:14px 16px;background:var(--surface);border:1px solid var(--line-strong);border-radius:12px;color:var(--ink);font-size:14px;outline:none;transition:border-color .2s ease}
.lsc-input:focus{border-color:var(--accent)}
.lsc-spinner{display:inline-block;width:14px;height:14px;border:2px solid currentColor;border-right-color:transparent;border-radius:50%;animation:lsc-spin .7s linear infinite}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script src="src/lsc-data.js"></script>
<script type="text/babel" src="src/lsc/Primitives.jsx"></script>
<script type="text/babel" src="src/lsc/Nav.jsx"></script>
<script type="text/babel" src="src/lsc/ProductCard.jsx"></script>
<script type="text/babel" src="src/lsc/Home.jsx"></script>
<script type="text/babel" src="src/lsc/Catalog.jsx"></script>
<script type="text/babel" src="src/lsc/Product.jsx"></script>
<script type="text/babel" src="src/lsc/Cart.jsx"></script>
<script type="text/babel" src="src/lsc/Checkout.jsx"></script>
<script type="text/babel" src="src/lsc/Footer.jsx"></script>
<script type="text/babel" src="src/lsc/App.jsx"></script>
</body>
</html>

services:
  db:
    image: postgres:15-alpine
    container_name: luisantico_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: luisantico
      POSTGRES_USER: luisantico
      POSTGRES_PASSWORD: luisantico2026
    ports:
      - "5432:5432"
    volumes:
      - luisantico_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U luisantico -d luisantico"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    image: nginx:alpine
    container_name: luisantico_web
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - .:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      db:
        condition: service_healthy

volumes:
  luisantico_pgdata:
